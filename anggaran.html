<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
    <title>Anggaran - DompetIn</title>
</head>
<body>

<div class="topbar">
  <div class="brand"><span class="coin">Rp</span> DompetIn</div>
  <button class="hamburger" id="hamburger">☰</button>
</div>

<div class="app-shell">
  <aside class="sidebar" id="sidebar">
    <div class="brand"><span class="coin">Rp</span> DompetIn</div>
    <ul class="nav-menu">
      <li><a href="index.html"> Beranda</a></li>
      <li><a href="transaksi.html"> Transaksi</a></li>
      <li><a href="anggaran.html" class="active"> Anggaran</a></li>
      <li><a href="laporan.html"> Laporan</a></li>
    </ul>
    <div class="sidebar-footer">
      <a href="tentang.html">Tentang aplikasi ini →</a>
    </div>
  </aside>

  <main class="main">
    <div class="page-header">
      <span class="eyebrow">Batasi</span>
      <h1>Anggaran per Kategori</h1>
      <p>Tentukan batas pengeluaran tiap kategori, lalu lihat progresnya dibanding pengeluaran bulan ini.</p>
    </div>

    <div class="two-col">
      <div>
        <div class="budget-list" id="budgetList"></div>
      </div>

      <div class="form-card">
        <h3 style="margin-bottom:18px;">Atur Batas Anggaran</h3>
        <form id="formBudget">
          <div class="form-row">
            <label for="kategoriBudget">Kategori</label>
            <select id="kategoriBudget" required>
              <option value="">-- pilih kategori --</option>
              <option value="Makanan">Makanan</option>
              <option value="Transportasi">Transportasi</option>
              <option value="Kebutuhan">Kebutuhan</option>
              <option value="Hiburan">Hiburan</option>
              <option value="Lainnya">Lainnya</option>
            </select>
          </div>
          <div class="form-row">
            <label for="batasBudget">Batas Anggaran (Rp)</label>
            <input type="number" id="batasBudget" min="1" placeholder="Contoh: 300000" required>
          </div>
          <button type="submit" class="btn">Simpan Anggaran</button>
          <p class="form-msg" id="budgetMsg"></p>
        </form>
      </div>
    </div>
  </main>
</div>

<script src="app.js"></script>
<script>
  // ---- Blok JS #5: hitung pengeluaran per kategori & render progress bar ----
  function renderBudget() {
    const transaksi = getTransaksi().filter(function (t) { return t.tipe === 'expense'; });
    const budget = getBudget();

    const totalPerKategori = {};
    transaksi.forEach(function (t) {
      totalPerKategori[t.kategori] = (totalPerKategori[t.kategori] || 0) + t.jumlah;
    });

    const list = document.getElementById('budgetList');

    if (budget.length === 0) {
      list.innerHTML = '<div class="empty-state"><span></span>Belum ada anggaran diatur.</div>';
      return;
    }

    list.innerHTML = budget.map(function (b) {
      const terpakai = totalPerKategori[b.kategori] || 0;
      const persen = Math.min(100, Math.round((terpakai / b.batas) * 100));
      const over = terpakai > b.batas;

      return '<div class="budget-item">' +
        '<div class="top-row">' +
          '<span class="cat-name">' + b.kategori + '</span>' +
          '<span class="cat-figures">' + formatRupiah(terpakai) + ' / ' + formatRupiah(b.batas) + '</span>' +
        '</div>' +
        '<div class="bar-track"><div class="bar-fill' + (over ? ' over' : '') + '" style="width:' + persen + '%"></div></div>' +
        (over ? '<div class="warn">⚠️ Sudah melebihi anggaran ' + formatRupiah(terpakai - b.batas) + '</div>' : '') +
        '</div>';
    }).join('');
  }

  // ---- Blok JS #6: form set/update anggaran ----
  document.addEventListener('DOMContentLoaded', function () {
    renderBudget();

    document.getElementById('formBudget').addEventListener('submit', function (e) {
      e.preventDefault();
      const kategori = document.getElementById('kategoriBudget').value;
      const batas = parseInt(document.getElementById('batasBudget').value, 10);
      const msg = document.getElementById('budgetMsg');

      if (!kategori || !batas || batas <= 0) {
        msg.textContent = 'Pilih kategori dan isi batas anggaran yang valid.';
        msg.className = 'form-msg show error';
        return;
      }

      const budget = getBudget();
      const existing = budget.find(function (b) { return b.kategori === kategori; });
      if (existing) {
        existing.batas = batas;
      } else {
        budget.push({ kategori: kategori, batas: batas });
      }
      saveBudget(budget);

      msg.textContent = 'Anggaran ' + kategori + ' berhasil disimpan.';
      msg.className = 'form-msg show success';

      this.reset();
      renderBudget();
    });
  });
</script>
</body>
</html>
