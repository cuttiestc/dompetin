<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up — DompetIn</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon" type="image/x-icon" href="logo.svg">
    <style>
        body {
            background: linear-gradient(135deg, #f7f9fd 0%, #eef3ff 100%);
        }

        .auth-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .auth-card {
            width: min(100%, 520px);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            box-shadow: var(--shadow);
            padding: 32px;
        }

        .auth-logo {
            width: 72px;
            height: 72px;
            margin: 0 auto 16px;
            display: block;
        }

        .auth-title {
            text-align: center;
            font-size: 1.9rem;
            margin-bottom: 8px;
        }

        .auth-subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 24px;
        }

        .field-group {
            margin-bottom: 16px;
        }

        .field-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.86rem;
            font-weight: 700;
            color: var(--primary);
        }

        .field-group input {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 0.95rem;
            background: #fbfcff;
        }

        .field-group input:focus {
            outline: 2px solid var(--accent);
            outline-offset: 1px;
        }

        .auth-actions {
            margin-top: 18px;
        }

        .auth-actions .btn {
            width: 100%;
            padding: 13px 20px;
            border-radius: 12px;
        }

        .auth-bottom {
            margin-top: 18px;
            text-align: center;
            font-size: 0.92rem;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="auth-wrap">
      <div class="auth-card">
        <img src="logo.svg" alt="Logo DompetIn" class="auth-logo" style="object-fit: contain;" />
        <h2 class="auth-title">Buat Akun Baru</h2>
        <p class="auth-subtitle">Daftar sekarang untuk mulai mengelola keuangan dengan DompetIn.</p>

        <div class="field-group">
          <label for="nameInput">Nama lengkap</label>
          <input type="text" id="nameInput" placeholder="Masukkan nama lengkap" />
        </div>

        <div class="field-group">
          <label for="usernameRegisterInput">Username</label>
          <input type="text" id="usernameRegisterInput" placeholder="Masukkan username" />
        </div>

        <div class="field-group">
          <label for="passwordRegisterInput">Password</label>
          <input type="password" id="passwordRegisterInput" placeholder="Masukkan password" />
        </div>

        <div class="field-group">
          <label for="confirmPasswordInput">Konfirmasi password</label>
          <input type="password" id="confirmPasswordInput" placeholder="Konfirmasi password" />
        </div>

        <div class="auth-actions">
          <button class="btn" onclick="registerAccount()">Sign Up</button>
        </div>

        <p class="auth-bottom">
          Sudah punya akun?
          <a href="login.html" class="text-decoration-none fw-semibold">Masuk di sini</a>
        </p>
      </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
