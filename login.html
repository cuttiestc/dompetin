<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DompetIn — Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
</head>
<style>
    body {
        background-color: #f8f9fa;
    }
    body .container {
        margin-top: 100px;
    }

</style>
<body>
    <div class="container" style="max-width: 500px">
      <div class="card shadow border-0 p-4 rounded-4">
        <h2 class="text-center text-dark mb-4 fw-bold">Login to Your Account</h2>
        <p class="text-center text-muted mb-4">Please enter your username and password to login.</p>

        <div class="mb-4">
          <input
            type="text"
            id="usernameInput"
            class="form-control form-control-lg fs-6"
            placeholder="Masukkan username"
          />
        </div>

        <div class="mb-4">
          <input
            type="password"
            id="passwordInput"
            class="form-control form-control-lg fs-6"
            placeholder="Masukkan password"
          />
        </div>

        <div class="row g-3 justify-content-center mb-4">
          <div class="col-6">
            <button
              class="btn btn-success w-100 py-2 fw-semibold
            d-flex align-items-center justify-content-center gap-2 "
              onclick="loginAccount()">Login
            </button>
          </div>
        </div>
      </div>
    </div>

    <script src = "app.js"></script>

</body>
</html>
